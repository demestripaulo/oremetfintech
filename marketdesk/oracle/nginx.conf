# Reverse proxy for MarketDesk on Oracle Cloud (OCI) Ubuntu 22.04 ARM (Ampere A1)
# Place at /etc/nginx/sites-available/marketdesk.conf and symlink into sites-enabled.

server {
    listen 80;
    server_name marketdesk.yourdomain.com;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /ws {
        proxy_pass http://127.0.0.1:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}

# After this is in place, run:
#   sudo certbot --nginx -d marketdesk.yourdomain.com
# to enable HTTPS/WSS via Let's Encrypt.
