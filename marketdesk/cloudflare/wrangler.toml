# O nome do Worker no Cloudflare deve casar com o nome do projeto
# conectado no dashboard (Workers Builds via Git) — ajuste se o seu
# projeto tiver outro nome, ou o CI vai sobrescrever este valor e
# avisar sobre o "Worker name mismatch" a cada deploy.
name = "oremetfintech"
main = "src/index.js"
compatibility_date = "2024-09-23"

# Serves the frontend (index.html, css/, js/) directly from this Worker, so
# a single deployed URL handles both the static app and the /api, /ws,
# /webhooks routes below. run_worker_first ensures our fetch() handler
# always runs first and can fall through to ASSETS for non-API paths.
#
# `public/` is a copy of `../frontend` kept INSIDE the cloudflare/ directory
# on purpose: some CI build environments (Cloudflare Workers Builds with a
# "Root directory" set to cloudflare/) only have this subtree checked out,
# so a relative "../frontend" path can silently resolve to zero files
# ("No files to upload"). Run `npm run sync-assets` after editing
# ../frontend to keep public/ up to date before deploying.
[assets]
directory = "public"
binding = "ASSETS"
run_worker_first = true

[[durable_objects.bindings]]
name = "MARKET_HUB"
class_name = "MarketHub"

[[migrations]]
tag = "v1"
new_classes = ["MarketHub"]

[[kv_namespaces]]
binding = "MARKET_KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_YOUR_KV_PREVIEW_NAMESPACE_ID"

[triggers]
crons = ["*/15 * * * *"]

[vars]
ENVIRONMENT = "production"

# Secrets (do NOT put real values here — use `wrangler secret put <NAME>`):
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put DANELFIN_API_KEY      (optional)
#   wrangler secret put GLASSNODE_API_KEY     (optional)
#   wrangler secret put MESSARI_API_KEY       (optional, unused by free endpoints)
#   wrangler secret put CRYPTOQUANT_WEBHOOK_SECRET (optional)

# To deploy:
#   1. wrangler kv:namespace create marketdesk_kv
#      -> copy the returned "id" into the [[kv_namespaces]] block above
#   2. wrangler secret put ANTHROPIC_API_KEY
#   3. wrangler deploy
#
# Custom domain:
#   wrangler.toml supports routes; add e.g.:
#   routes = [{ pattern = "marketdesk.yourdomain.com/*", custom_domain = true }]
